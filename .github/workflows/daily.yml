name: daily
on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m src.daily
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      - run: |
          git config user.name "watchlist-curator"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          if ! git diff --cached --quiet; then
            git commit -m "newsletter: $(date -u +%F)"
            # generated files conflict when runs overlap: take ours, then
            # rebuild the site from the merged newsletters and fold it in
            git pull --rebase -X theirs origin main
            python -m src.site
            git add docs
            git diff --cached --quiet || git commit --amend --no-edit
            git push
          fi
